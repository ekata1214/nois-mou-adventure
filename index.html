<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>ムー君の冒険 — NOU</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <div id="title-screen">
      <p class="brand">UNGR ARCHIVE PRESENTS</p>
      <img id="title-art" src="assets/title.png" alt="ムー君の冒険" />
      <p class="start-hint">CLICK / SPACE / TAP to enter NOU</p>
      <p class="credit">Nois Mou — World Scale Prototype</p>
    </div>
    <canvas id="game" width="1280" height="720"></canvas>

    <div id="shell-screen" class="hidden">
      <p class="shell-brand">INTROVERT — 殻（カラ）</p>
      <div class="shell-layout">
        <div class="shell-visual">
          <div class="shell-oval"></div>
          <img id="shell-muu" src="assets/muu/front.png" alt="ムー君" />
          <p id="muu-speech">……</p>
        </div>
        <div class="shell-panel">
          <label for="feed-input">餌（日記・愚痴・嬉しかったこと）</label>
          <textarea id="feed-input" rows="6" placeholder="今日あったこと、思ったこと……"></textarea>
          <button id="feed-btn" type="button">餌をあげる</button>
          <div id="dark-meter">
            <span>闇の思念体</span>
            <div class="meter-track"><div id="dark-fill"></div></div>
          </div>
          <div class="gauge-row shell-gauge">
            <span class="gauge-label">体力</span>
            <div class="meter-track"><div id="shell-hp-fill" class="gauge-fill hp"></div></div>
          </div>
          <div class="gauge-row shell-gauge">
            <span class="gauge-label">人間</span>
            <div class="meter-track"><div id="shell-human-fill" class="gauge-fill human"></div></div>
          </div>
          <ul id="feed-log"></ul>
        </div>
      </div>
      <button id="to-nou" type="button" class="mode-switch">NOUへ出る（エクストロバート）</button>
    </div>

    <div id="encounter-screen" class="hidden">
      <div id="combat-flash" class="hidden"></div>
      <div class="encounter-panel">
        <p class="encounter-brand">ENCOUNTER</p>
        <p id="combat-type" class="combat-type"></p>
        <h2 id="entity-name">感情の気配</h2>
        <p id="entity-line">……</p>
        <div id="entity-visual"></div>
        <div class="choice-grid">
          <button type="button" data-choice="kill">殺す</button>
          <button type="button" data-choice="eat">食べる</button>
          <button type="button" data-choice="ignore">無視する</button>
          <button type="button" data-choice="friend">友達になる</button>
        </div>
        <p id="choice-result" class="choice-result"></p>
        <button id="encounter-close" type="button" class="mode-switch hidden">立ち去る</button>
      </div>
    </div>

    <div id="hud" class="hidden">
      <div id="hud-left">
        <span id="area-label">NOU — 始まりの交差点</span>
        <div class="gauge-row">
          <span class="gauge-label">体力</span>
          <div class="meter-track"><div id="hp-fill" class="gauge-fill hp"></div></div>
        </div>
        <div class="gauge-row">
          <span class="gauge-label">人間</span>
          <div class="meter-track"><div id="human-fill" class="gauge-fill human"></div></div>
        </div>
      </div>
      <div id="hud-right">
        <span id="mood-label">静寂</span>
        <button id="to-shell" type="button" class="mode-switch small">殻へ戻る</button>
      </div>
    </div>

    <div id="gameover-screen" class="hidden">
      <div class="gameover-panel">
        <p class="encounter-brand">GAME OVER</p>
        <h2>体力が尽きた</h2>
        <p class="gameover-line">……</p>
        <button id="retry-btn" type="button" class="mode-switch">殻へ戻る</button>
        <button id="full-reset-btn" type="button" class="mode-switch ghost">はじめから</button>
      </div>
    </div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
