name: Deploy gh-pages branch (LFS binaries)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-branch
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Materialize LFS binaries
        run: |
          git lfs install
          git lfs fetch --all
          git lfs checkout
          git lfs pull
          bash scripts/verify-glb-binaries.sh

      - name: Generate good-mou.glb if missing
        continue-on-error: true
        run: |
          if [ ! -f assets/muu/good-mou.glb ] && [ -f assets/muu/speak_mou.glb ] && [ -f scripts/package.json ]; then
            cd scripts && npm install --omit=dev
            node extract-good-mou-glb.mjs
          fi

      - name: Build static site
        run: |
          mkdir -p /tmp/site
          rsync -aL \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tools' \
            --exclude='scripts/node_modules' \
            --exclude='node_modules' \
            ./ /tmp/site/
          bash scripts/verify-glb-binaries.sh /tmp/site
          touch /tmp/site/.nojekyll

      - name: Push to gh-pages branch
        run: |
          cd /tmp/site
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy static site with LFS binaries (${GITHUB_SHA:0:7})"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
