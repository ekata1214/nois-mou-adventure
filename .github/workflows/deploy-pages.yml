name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout with LFS
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Materialize LFS binaries
        run: git lfs pull

      - name: Generate good-mou.glb if missing
        continue-on-error: true
        run: |
          if [ ! -f assets/muu/good-mou.glb ] && [ -f assets/muu/speak_mou.glb ] && [ -f scripts/package.json ]; then
            cd scripts && npm install --omit=dev
            node extract-good-mou-glb.mjs
          else
            echo "skip good-mou extraction"
          fi

      - name: Prepare static site
        run: |
          mkdir -p /tmp/site
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tools' \
            --exclude='scripts/node_modules' \
            --exclude='node_modules' \
            ./ /tmp/site/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: /tmp/site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
